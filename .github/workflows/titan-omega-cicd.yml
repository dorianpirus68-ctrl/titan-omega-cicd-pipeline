                  </service>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/lml/robotai/HumanMotion.java <<'EOF'
          package com.lml.robotai;
          import android.accessibilityservice.AccessibilityService; import android.accessibilityservice.GestureDescription; import android.graphics.Path; import java.util.Random;
          public class HumanMotion {
              private static final Random rng = new Random();
              public static void tap(AccessibilityService s, int x, int y) {
                  try {
                      int ox = x + (rng.nextInt(20) - 10); int oy = y + (rng.nextInt(20) - 10);
                      Path p = new Path(); p.moveTo(ox, oy); p.lineTo(ox+1, oy+1);
                      s.dispatchGesture(new GestureDescription.Builder().addStroke(new GestureDescription.StrokeDescription(p, 0, 40 + rng.nextInt(60))).build(), null, null);
                  } catch(Exception e){}
              }
              public static void swipe(AccessibilityService s, int sx, int sy, int ex, int ey) {
                  try {
                      Path p = new Path(); p.moveTo(sx, sy);
                      int cx = sx + (rng.nextInt(100) - 50); int cy = sy + (ey - sy)/2;
                      p.quadTo(cx, cy, ex, ey);
                      s.dispatchGesture(new GestureDescription.Builder().addStroke(new GestureDescription.StrokeDescription(p, 0, 300 + rng.nextInt(300))).build(), null, null);
                  } catch(Exception e){}
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/LearningEngine.java <<'EOF'
          package com.lml.robotai;
          import java.util.ArrayList; import java.util.List;
          public class LearningEngine {
              public static boolean isRecording = false; public static List<String> steps = new ArrayList<>(); private static long lastActionTime = 0;
              public static void start() { isRecording = true; steps.clear(); lastActionTime = System.currentTimeMillis(); }
              public static void recordClick(String nodeLabel) {
                  if(!isRecording || nodeLabel == null || nodeLabel.trim().isEmpty()) return;
                  long now = System.currentTimeMillis();
                  if(lastActionTime > 0) {
                      int seconds = Math.max(1, (int)((now - lastActionTime) / 1000));
                      steps.add("attends " + seconds);
                  }
                  steps.add("clique sur \"" + nodeLabel.trim() + "\"");
                  lastActionTime = now;
              }
              public static String stopAndGetSequence() {
                  isRecording = false; if(steps.isEmpty()) return null;
                  return String.join(" puis ", steps);
              }
          }
          EOF

