name: LML XTREND SCALPING AGI - PRODUCTION BUILD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_lml_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Configuration explicite de Java 17 (Requis pour Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project Structure and Files
        run: |
          mkdir -p app/src/main/java/com/lml/tradingbot
          mkdir -p app/src/main/res/xml

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.lml.tradingbot">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.BIND_ACCESSIBILITY_SERVICE" />
              <application android:label="LML XTREND AGI">
                  <service android:name=".TradingAccessibility" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                      <intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                  </service>
                  <service android:name=".TradingOverlayService" />
              </application>
          </manifest>
          EOF

          # Config Accessibilité
          cat > app/src/main/res/xml/accessibility_service_config.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:canRetrieveWindowContent="true"
              android:canPerformGestures="true" />
          EOF

          # TradingAccessibility.java
          cat > app/src/main/java/com/lml/tradingbot/TradingAccessibility.java <<'EOF'
          package com.lml.tradingbot;
          import android.accessibilityservice.AccessibilityService;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.content.Intent;

          public class TradingAccessibility extends AccessibilityService {
              private double lastPrice = 0.0;
              private long lastUpdateTime = 0;
              
              private double seuilMomentum = 10.0; 
              private boolean enPosition = false; 
              private double prixEntree = 0.0;
              private String typeTrade = ""; 
              private double capitalSimule = 100.0; 

              @Override
              public void onServiceConnected() { 
                  startService(new Intent(this, TradingOverlayService.class)); 
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  if (System.currentTimeMillis() - lastUpdateTime < 200) return; 
                  
                  AccessibilityNodeInfo rootNode = getRootInActiveWindow();
                  if (rootNode != null) {
                      if (enPosition) {
                          if (verifierPopUpFinDeTrade(rootNode)) {
                              enPosition = false;
                              lastPrice = 0.0; 
                              mettreAJourHUD("SCAN (Analyse du marché)", 0.0);
                          }
                      } else {
                          chercherPrixEtAnalyser(rootNode, rootNode);
                      }
                  }
              }

              private boolean verifierPopUpFinDeTrade(AccessibilityNodeInfo node) {
                  if (node == null) return false;
                  
                  CharSequence textSeq = node.getText();
                  if (textSeq != null) {
                      String text = textSeq.toString().toUpperCase();
                      
                      if (text.contains("+0.75")) {
                          gagnerTrade();
                          cliquerSurBouton(getRootInActiveWindow(), "CONTINUE"); 
                          return true;
                      }
                      if (text.contains("-1C") || text.contains("-1.0")) {
                          perdreTrade();
                          cliquerSurBouton(getRootInActiveWindow(), "CONTINUE"); 
                          return true;
                      }
                  }
                  
                  for (int i = 0; i < node.getChildCount(); i++) {
                      if (verifierPopUpFinDeTrade(node.getChild(i))) return true;
                  }
                  return false;
              }

              private void chercherPrixEtAnalyser(AccessibilityNodeInfo node, AccessibilityNodeInfo root) {
                  if (node == null) return;
                  
                  if (node.getClassName() != null && node.getClassName().toString().equals("android.widget.TextView")) {
                      CharSequence textSeq = node.getText();
                      if (textSeq != null) {
                          String text = textSeq.toString().trim().replace(",", ""); 
                          if (text.matches("^[0-9]+(\\.[0-9]+)?$")) { 
                              try {
                                  double currentPrice = Double.parseDouble(text);
                                  if (currentPrice > 1000) { 
                                      analyserMomentum(currentPrice, root);
                                      lastUpdateTime = System.currentTimeMillis();
                                      return;
                                  }
                              } catch (Exception e) {}
                          }
                      }
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      chercherPrixEtAnalyser(node.getChild(i), root);
                  }
                  node.recycle();
              }

              private void analyserMomentum(double currentPrice, AccessibilityNodeInfo root) {
                  if (lastPrice == 0.0) { lastPrice = currentPrice; return; }
                  double diff = currentPrice - lastPrice;

                  if (diff > seuilMomentum) {
                      if (cliquerSurBouton(root, "ACHETER")) { 
                          enPosition = true; prixEntree = currentPrice; typeTrade = "ACHETER";
                          mettreAJourHUD("ACHAT (Trade en cours...)", currentPrice);
                      }
                  } else if (diff < -seuilMomentum) {
                      if (cliquerSurBouton(root, "VENDRE")) { 
                          enPosition = true; prixEntree = currentPrice; typeTrade = "VENDRE";
                          mettreAJourHUD("VENTE (Trade en cours...)", currentPrice);
                      }
                  } else {
                      mettreAJourHUD("SCAN...", currentPrice);
                  }
                  
                  lastPrice = currentPrice;
              }

              private void gagnerTrade() {
                  capitalSimule += 0.70; 
                  if (seuilMomentum > 5.0) seuilMomentum -= 0.5; 
              }

              private void perdreTrade() {
                  capitalSimule -= 1.00; 
                  seuilMomentum += 1.0; 
              }

              private boolean cliquerSurBouton(AccessibilityNodeInfo node, String texteRecherche) {
                  if (node == null) return false;
                  CharSequence text = node.getText();
                  CharSequence contentDesc = node.getContentDescription();
                  
                  if ((text != null && text.toString().toUpperCase().contains(texteRecherche)) ||
                      (contentDesc != null && contentDesc.toString().toUpperCase().contains(texteRecherche))) {
                      if (node.isClickable()) {
                          node.performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          return true;
                      } else if (node.getParent() != null && node.getParent().isClickable()) {
                          node.getParent().performAction(AccessibilityNodeInfo.ACTION_CLICK);
                          return true;
                      }
                  }
                  
                  for (int i = 0; i < node.getChildCount(); i++) {
                      if (cliquerSurBouton(node.getChild(i), texteRecherche)) return true;
                  }
                  return false;
              }

              private void mettreAJourHUD(String signal, double currentPrice) {
                  Intent intent = new Intent("COM_LML_TRADING_UPDATE");
                  intent.putExtra("SIGNAL", signal);
                  intent.putExtra("PRICE", String.valueOf(currentPrice));
                  intent.putExtra("CAPITAL", String.format("%.2f", capitalSimule));
                  intent.putExtra("SEUIL", String.format("%.2f", seuilMomentum));
                  sendBroadcast(intent);
              }

              @Override
              public void onInterrupt() {}
          }
          EOF

          # TradingOverlayService.java
          cat > app/src/main/java/com/lml/tradingbot/TradingOverlayService.java <<'EOF'
          package com.lml.tradingbot;
          import android.app.Service;
          import android.os.IBinder;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.view.WindowManager;
          import android.widget.TextView;
          import android.graphics.PixelFormat;
          import android.view.Gravity;
          import android.graphics.Color;

          public class TradingOverlayService extends Service {
              private WindowManager wm;
              private TextView hud;
              private SignalReceiver receiver;

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  hud = new TextView(this);
                  hud.setText("ION SNIPER: PRÊT");
                  hud.setTextColor(Color.WHITE);
                  hud.setTextSize(14f);
                  hud.setBackgroundColor(Color.parseColor("#BB000000")); 
                  hud.setPadding(15, 15, 15, 15);

                  WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT, WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  params.gravity = Gravity.TOP | Gravity.START;
                  params.y = 200; 
                  wm.addView(hud, params);

                  receiver = new SignalReceiver();
                  registerReceiver(receiver, new IntentFilter("COM_LML_TRADING_UPDATE"), Context.RECEIVER_EXPORTED);
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (hud != null) wm.removeView(hud);
                  if (receiver != null) unregisterReceiver(receiver);
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }

              private class SignalReceiver extends BroadcastReceiver {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      if (intent != null && "COM_LML_TRADING_UPDATE".equals(intent.getAction())) {
                          String signal = intent.getStringExtra("SIGNAL");
                          String price = intent.getStringExtra("PRICE");
                          String capital = intent.getStringExtra("CAPITAL");
                          String seuil = intent.getStringExtra("SEUIL");
                          
                          String texteAffichage = "BTCUSD: " + price + "\n" +
                                                  "Action: " + signal + "\n" +
                                                  "Capital: " + capital + "$\n" +
                                                  "Volatilité Req: " + seuil + "$";
                          hud.setText(texteAffichage);
                          
                          if (signal.contains("ACHAT")) hud.setTextColor(Color.GREEN);
                          else if (signal.contains("VENTE")) hud.setTextColor(Color.RED);
                          else hud.setTextColor(Color.WHITE);
                      }
                  }
              }
          }
          EOF

          # settings.gradle CORRIGÉ (Ajout des dépôts Google et MavenCentral)
          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "LML_XTREND_AGI"
          include ':app'
          EOF

          # app/build.gradle CORRIGÉ (Déclaration de la version exacte du plugin)
          cat > app/build.gradle <<'EOF'
          plugins { 
              id 'com.android.application' version '8.1.0' 
          }
          android {
              namespace 'com.lml.tradingbot'
              compileSdk 34
              defaultConfig {
                  applicationId "com.lml.tradingbot"
                  minSdk 33
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          EOF

      # 2. Utilisation de Gradle global pour générer le wrapper et compiler
      - name: Build APK
        run: |
          gradle wrapper
          ./gradlew assembleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LML-XTREND-AGI-FINAL
          path: app/build/outputs/apk/release/*.apk

