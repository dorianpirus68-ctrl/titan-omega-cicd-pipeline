name: TITAN OMEGA CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Génération du Noyau OMEGA (Code Source)
        run: |
          set -e
          rm -rf app
          mkdir -p app/src/main/java/com/lml/robotai
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "LMLTitanOmega"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins { id "com.android.application" version "8.5.2" apply false }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id "com.android.application" }
          def autoVersionCode = System.getenv("GITHUB_RUN_NUMBER") != null ? System.getenv("GITHUB_RUN_NUMBER").toInteger() : 1
          android {
              namespace "com.lml.robotai"
              compileSdk 34
              defaultConfig { applicationId "com.lml.robotai.omega"; minSdk 26; targetSdk 34; versionCode autoVersionCode; versionName "OMEGA.40." + autoVersionCode }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              buildTypes {
                  release {
                      minifyEnabled false
                      // Signing disabled for easy first builds (debug key used)
                  }
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'androidx.core:core-ktx:1.12.0' }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">TITAN OMEGA</string><string name="accessibility_desc">Agent Système OMEGA : Stealth, AGI, Imitation, OmniBridge.</string></resources>
          EOF

          cat > app/src/main/res/xml/accessibility_service_config.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:description="@string/accessibility_desc" android:accessibilityEventTypes="typeViewClicked|typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric" android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagIncludeNotImportantViews"
              android:canRetrieveWindowContent="true" android:canPerformGestures="true" android:notificationTimeout="50" />
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <application android:theme="@android:style/Theme.Material.NoActionBar" android:label="TITAN OMEGA" android:allowBackup="false">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                  <service android:name=".FloatingRobotService" android:exported="false" android:foregroundServiceType="specialUse" tools:ignore="ForegroundServicePermission" />
                  <service android:name=".LmlAccessibilityService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                      <intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                  </service>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/lml/robotai/Humanizer.java <<'EOF'
          package com.lml.robotai;
          import android.graphics.Path; import java.util.Random;
          public class Humanizer {
              private static final Random r = new Random();
              public static int[] randomize(int x, int y, int range) { return new int[]{ x + r.nextInt(range*2)-range, y + r.nextInt(range*2)-range }; }
              public static Path createHumanPath(int sx, int sy, int ex, int ey) {
                  Path p = new Path(); p.moveTo(sx, sy);
                  int mx = (sx+ex)/2 + r.nextInt(100)-50; int my = (sy+ey)/2 + r.nextInt(100)-50;
                  p.quadTo(mx, my, ex, ey); return p;
              }
              public static long getPressDuration() { return 80 + r.nextInt(150); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/SkillRecorder.java <<'EOF'
          package com.lml.robotai;
          import java.util.ArrayList; import java.util.List;
          public class SkillRecorder {
              private List<String> steps = new ArrayList<>(); private boolean isRecording = false;
              public void start() { steps.clear(); isRecording = true; }
              public void stop() { isRecording = false; }
              public boolean isRecording() { return isRecording; }
              public void capture(String action, int x, int y) { if(isRecording) steps.add(action+";"+x+";"+y+";"+System.currentTimeMillis()); }
              public String serialize() { return String.join("|", steps); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/DecisionEngine.java <<'EOF'
          package com.lml.robotai;
          import android.os.Handler; import android.os.Looper; import java.util.List;
          public class DecisionEngine {
              private final FloatingRobotService svc; private int retries = 0; private String lastHash = "";
              public DecisionEngine(FloatingRobotService s) { svc = s; }
              public void autonomousDecision(String task, List<ScreenNode> nodes) {
                  String h = getHash(nodes);
                  if(h.equals(lastHash)) { retries++; if(retries>3) { svc.log("[FAIL] Blocage détecté."); retries=0; return; } } else { retries=0; lastHash=h; }
                  String ctx = ScreenAnalyzer.exportJsonHierarchy(nodes);
                  svc.geminiBridge.askGeminiApp(task, ctx);
              }
              private String getHash(List<ScreenNode> n) { StringBuilder sb=new StringBuilder(); for(ScreenNode x:n)sb.append(x.key()); return Integer.toHexString(sb.toString().hashCode()); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/GeminiBridge.java <<'EOF'
          package com.lml.robotai;
          import android.content.*; import android.os.*; import java.util.List;
          public class GeminiBridge {
              private final Context ctx; private final Handler h = new Handler(Looper.getMainLooper());
              public GeminiBridge(Context c) { ctx = c; }
              public void askGeminiApp(String cmd, String ui) {
                  String prompt = "TITAN_PROTOCOL: "+cmd+"\nUI: "+ui+"\nReponds 'CLIC X Y' ou 'SCROLL' UNIQUEMENT.";
                  ClipboardManager cb = (ClipboardManager) ctx.getSystemService(Context.CLIPBOARD_SERVICE);
                  if(cb!=null) cb.setPrimaryClip(ClipData.newPlainText("TITAN", prompt));
                  Intent i = ctx.getPackageManager().getLaunchIntentForPackage("com.google.android.apps.bard");
                  if(i!=null) { i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); ctx.startActivity(i); h.postDelayed(this::inject, 1500); }
              }
              private void inject() {
                  if(LmlAccessibilityService.INSTANCE==null) return;
                  List<ScreenNode> n = LmlAccessibilityService.INSTANCE.scan();
                  for(ScreenNode x:n) { if(x.editable || x.label().contains("tapez")) { LmlAccessibilityService.INSTANCE.tap(x.cx(), x.cy()); break; } }
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/TitanOmniBridge.java <<'EOF'
          package com.lml.robotai;
          import android.content.Context; import android.content.Intent;
          public class TitanOmniBridge {
              private final Context ctx; public TitanOmniBridge(Context c) { ctx = c; }
              public void searchGlobal(String q) { Intent i = new Intent(Intent.ACTION_SEARCH); i.putExtra("query", q); i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); ctx.startActivity(i); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/ScreenAnalyzer.java <<'EOF'
          package com.lml.robotai;
          import android.graphics.Rect; import android.view.accessibility.AccessibilityNodeInfo; import java.util.ArrayList; import java.util.List;
          class ScreenNode {
              public String text, desc, cls, pkg; public Rect bounds; public boolean clickable, editable; public AccessibilityNodeInfo raw;
              public ScreenNode(AccessibilityNodeInfo n, Rect b) { text=n.getText()!=null?n.getText().toString():""; desc=n.getContentDescription()!=null?n.getContentDescription().toString():""; bounds=b; clickable=n.isClickable(); editable=n.isEditable(); raw=n; }
              public String label() { return (text+" "+desc).trim(); } public int cx(){return bounds.centerX();} public int cy(){return bounds.centerY();} public String key(){return pkg+text+desc;}
          }
          public class ScreenAnalyzer {
              public static List<ScreenNode> scan(AccessibilityNodeInfo root) { List<ScreenNode> out=new ArrayList<>(); walk(root,out); return out; }
              private static void walk(AccessibilityNodeInfo n, List<ScreenNode> out) { if(n==null)return; Rect r=new Rect(); n.getBoundsInScreen(r); if(r.width()>10 && (n.isClickable()||n.isEditable()||(n.getText()!=null&&n.getText().length()>0))) out.add(new ScreenNode(n,r)); for(int i=0;i<n.getChildCount();i++) walk(n.getChild(i),out); }
              public static String exportJsonHierarchy(List<ScreenNode> nodes) { StringBuilder sb = new StringBuilder("["); for(ScreenNode n:nodes) sb.append("{label:'").append(n.label().replace("'","")).append("',x:").append(n.cx()).append(",y:").append(n.cy()).append("},"); return sb.append("]").toString(); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/LmlAccessibilityService.java <<'EOF'
          package com.lml.robotai;
          import android.accessibilityservice.*; import android.graphics.Path; import android.os.Handler; import android.os.Looper; import android.view.accessibility.*; import java.util.ArrayList; import java.util.List;
          public class LmlAccessibilityService extends AccessibilityService {
              public static LmlAccessibilityService INSTANCE; public SkillRecorder recorder = new SkillRecorder();
              @Override protected void onServiceConnected() { INSTANCE = this; }
              @Override public void onAccessibilityEvent(AccessibilityEvent e) { if(recorder.isRecording() && e.getEventType()==AccessibilityEvent.TYPE_VIEW_CLICKED) recorder.capture("TAP", e.getSource().getBoundsInScreen().centerX(), e.getSource().getBoundsInScreen().centerY()); }
              @Override public void onInterrupt() {}
              public List<ScreenNode> scan() { AccessibilityNodeInfo r=getRootInActiveWindow(); return r!=null ? ScreenAnalyzer.scan(r) : new ArrayList<>(); }
              public void tap(int x, int y) {
                  int[] c = Humanizer.randomize(x,y,4); Path p = new Path(); p.moveTo(c[0],c[1]); p.lineTo(c[0]+1,c[1]+1);
                  dispatchGesture(new GestureDescription.Builder().addStroke(new GestureDescription.StrokeDescription(p, 0, Humanizer.getPressDuration())).build(), null, null);
              }
              public void swipe(int sx, int sy, int ex, int ey) {
                  Path p = Humanizer.createHumanPath(sx,sy,ex,ey);
                  dispatchGesture(new GestureDescription.Builder().addStroke(new GestureDescription.StrokeDescription(p, 0, 300+(long)(Math.random()*200))).build(), null, null);
              }
              public void goBack() { performGlobalAction(GLOBAL_ACTION_BACK); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/FloatingRobotService.java <<'EOF'
          package com.lml.robotai;
          import android.app.*; import android.content.*; import android.graphics.*; import android.graphics.drawable.GradientDrawable; import android.os.*; import android.view.*; import android.widget.*; import androidx.core.app.NotificationCompat; import java.util.List;
          public class FloatingRobotService extends Service {
              private static FloatingRobotService instance; public GeminiBridge geminiBridge; public DecisionEngine brain; public TitanOmniBridge omni;
              private WindowManager wm; private LinearLayout panel; private TextView report; private PowerManager.WakeLock wakeLock; private SharedPreferences skills;
              public static FloatingRobotService getInstance() { return instance; }
              @Override public void onCreate() {
                  super.onCreate(); instance = this; geminiBridge = new GeminiBridge(this); brain = new DecisionEngine(this); omni = new TitanOmniBridge(this); skills = getSharedPreferences("LML_SKILLS", MODE_PRIVATE);
                  NotificationChannel ch = new NotificationChannel("OMEGA", "TITAN OMEGA", NotificationManager.IMPORTANCE_HIGH); getSystemService(NotificationManager.class).createNotificationChannel(ch);
                  startForeground(369, new NotificationCompat.Builder(this,"OMEGA").setContentTitle("TITAN Actif").setSmallIcon(android.R.drawable.ic_menu_compass).build());
                  PowerManager pm = (PowerManager)getSystemService(POWER_SERVICE); wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "LML::OmegaCpu"); wakeLock.acquire(3600000L);
                  wm = (WindowManager)getSystemService(WINDOW_SERVICE); buildUI();
              }
              private void buildUI() {
                  panel = new LinearLayout(this); panel.setOrientation(LinearLayout.VERTICAL); panel.setBackgroundColor(Color.parseColor("#E6000000")); panel.setPadding(20,20,20,20);
                  Button btnRec = new Button(this); btnRec.setText("REC IMPRINT"); btnRec.setTextColor(Color.RED); btnRec.setOnClickListener(v -> {
                      SkillRecorder r = LmlAccessibilityService.INSTANCE.recorder;
                      if(!r.isRecording()) { r.start(); log("Enregistrement en cours..."); btnRec.setText("SAVE IMPRINT"); }
                      else { r.stop(); skills.edit().putString("last_imprint", r.serialize()).apply(); log("Mémoire enregistrée."); btnRec.setText("REC IMPRINT"); }
                  });
                  Button btnPlay = new Button(this); btnPlay.setText("PLAY IMPRINT"); btnPlay.setTextColor(Color.GREEN); btnPlay.setOnClickListener(v -> playImprint());
                  report = new TextView(this); report.setTextColor(Color.WHITE); report.setTextSize(10);
                  panel.addView(btnRec); panel.addView(btnPlay); panel.addView(report);
                  WindowManager.LayoutParams p = new WindowManager.LayoutParams(600, 400, WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY, WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  p.gravity=Gravity.TOP|Gravity.START; p.x=50; p.y=200; wm.addView(panel, p);
              }
              private void playImprint() {
                  String seq = skills.getString("last_imprint", null); if(seq==null) return;
                  new Thread(()->{
                      for(String s:seq.split("\\|")) { String[] d=s.split(";"); LmlAccessibilityService.INSTANCE.tap(Integer.parseInt(d[1]), Integer.parseInt(d[2])); try{Thread.sleep(800);}catch(Exception e){} }
                      log("Imitation terminée.");
                  }).start();
              }
              public void log(String s) { new Handler(Looper.getMainLooper()).post(() -> report.append(s+"\n")); }
              @Override public int onStartCommand(Intent i, int f, int id) { return START_STICKY; }
              @Override public IBinder onBind(Intent i) { return null; }
              @Override public void onDestroy() { if(wakeLock!=null) wakeLock.release(); wm.removeView(panel); super.onDestroy(); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/MainActivity.java <<'EOF'
          package com.lml.robotai;
          import android.app.Activity; import android.content.Intent; import android.os.Bundle; import android.provider.Settings;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle b) { super.onCreate(b); startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS)); startService(new Intent(this, FloatingRobotService.class)); finish(); }
          }
          EOF

          # Generate Gradle wrapper
          gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: 🔨 Compilation TITAN OMEGA (Debug - sans keystore)
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Préparation de l'Artefact Release
        run: |
          VERSION="40.${GITHUB_RUN_NUMBER}"
          mkdir -p app/build/outputs/apk/debug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/LML-TITAN-OMEGA-v${VERSION}-debug.apk || true

      - name: 🚀 Déploiement Automatique (GitHub Release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OMEGA-v40.${GITHUB_RUN_NUMBER}
          name: TITAN OMEGA v40.${GITHUB_RUN_NUMBER} (Debug)
          body: |
            ### 🚀 LML TITAN OMEGA DEPLOYED (Debug build - no keystore required)
            - Build Debug pour installation facile sans keystore.
            - Moteur AGI `DecisionEngine` intégré.
            - Furtivité `Humanizer` activée.
            - Pont `GeminiBridge` fonctionnel.
            - Apprentissage par imitation.
            
            **Note** : Pour une version Release signée, ajoute le secret KEYSTORE_BASE64 plus tard.
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
