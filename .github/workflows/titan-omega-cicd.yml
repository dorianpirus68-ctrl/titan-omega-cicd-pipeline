          package com.lml.robotai;
          public class SafetyGuard {
              public static boolean bypassForSafeMode = false;
              public static boolean isDanger(String raw) {
                  if (bypassForSafeMode) return false; 
                  if (raw == null) return false; String s = raw.toLowerCase();
                  String[] danger = {"acheter","achat","buy","vendre","vente","sell","depot","deposit","retrait","withdraw","payer","paiement","payment","envoyer","send","password","mot de passe","banque","virement","transfer","trade","order","long","short","leverage"};
                  for (String d : danger) if (s.contains(d)) return true; return false;
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/AgiNetworkManager.java <<'EOF'
          package com.lml.robotai;
          import java.io.BufferedReader; import java.io.InputStreamReader; import java.io.OutputStream; import java.net.HttpURLConnection; import java.net.URL; import java.util.concurrent.ExecutorService; import java.util.concurrent.Executors;
          
          public class AgiNetworkManager {
              private final ExecutorService executor = Executors.newSingleThreadExecutor();
              private final String API_KEY = "TA_CLE_API_GEMINI_ICI"; 
              private final String ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=";

              public interface LlmCallback { void onResponse(String answer, boolean success); }
              
              public void sendPrompt(String systemContext, String userPrompt, LlmCallback cb) {
                  executor.execute(() -> {
                      try {
                          URL url = new URL(ENDPOINT + API_KEY); HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST"); conn.setRequestProperty("Content-Type", "application/json"); conn.setDoOutput(true);
                          
                          String safeSys = systemContext.replace("\"", "\\\"").replace("\n", " "); 
                          String safePrompt = userPrompt.replace("\"", "\\\"").replace("\n", " ");
                          String combinedPrompt = safeSys + " | INSTRUCTION: " + safePrompt;
                          String payload = "{\"contents\":[{\"parts\":[{\"text\":\"" + combinedPrompt + "\"}]}]}";
                          
                          try(OutputStream os = conn.getOutputStream()) { byte[] input = payload.getBytes("utf-8"); os.write(input, 0, input.length); }
                          if (conn.getResponseCode() == 200) {
                              BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream(), "utf-8")); StringBuilder resp = new StringBuilder(); String line;
                              while ((line = br.readLine()) != null) resp.append(line.trim());
                              String raw = resp.toString(); int start = raw.indexOf("\"text\": \"") + 9; int end = raw.indexOf("\"", start);
                              if (start > 8 && end > start) { cb.onResponse(raw.substring(start, end).replace("\\n", "\n").replace("\\\"", "\""), true); } 
                              else { cb.onResponse("Reponse Gemini illisible.", false); }
                          } else { cb.onResponse("Erreur API HTTP: " + conn.getResponseCode(), false); }
                      } catch (Exception e) { cb.onResponse("Erreur de connexion.", false); }
                  });
              }
          }
          EOF

