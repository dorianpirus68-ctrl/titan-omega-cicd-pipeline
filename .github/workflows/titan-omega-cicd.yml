          cat > app/src/main/java/com/lml/robotai/AgiIntentParser.java <<'EOF'
          package com.lml.robotai;
          import java.util.ArrayList; import java.util.List; import java.util.regex.Matcher; import java.util.regex.Pattern;
          public class AgiIntentParser {
              public static String extractQuoteArgument(String command) { Matcher m = Pattern.compile("[\"'](.*?)[\"']").matcher(command); if (m.find()) return m.group(1); return null; }
              public static List<String> parseSequence(String rawCommand) {
                  List<String> steps = new ArrayList<>(); if (rawCommand == null || rawCommand.trim().isEmpty()) return steps;
                  String[] parts = rawCommand.toLowerCase().split("\\bpuis\\b|\\bet\\b|\\bensuite\\b|\\bapres\\b");
                  for (String p : parts) { String clean = p.trim(); if (!clean.isEmpty()) steps.add(clean); } return steps;
              }
          }
