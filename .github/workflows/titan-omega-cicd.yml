                          LmlAccessibilityService.INSTANCE.tap(mNode.cx(), mNode.cy()); 
                          mainHandler.postDelayed(() -> { 
                              List<ScreenNode> tempNodes2 = LmlAccessibilityService.INSTANCE.scan(); ScreenNode rNode = neuralSwarm.findByText(tempNodes2, "supprimer"); if (rNode == null) rNode = neuralSwarm.findByText(tempNodes2, "retirer"); 
                              if (rNode != null) { 
                                  LmlAccessibilityService.INSTANCE.tap(rNode.cx(), rNode.cy()); 
                                  mainHandler.postDelayed(() -> { 
                                      mainHandler.postDelayed(() -> {
                                          List<ScreenNode> tempNodes3 = LmlAccessibilityService.INSTANCE.scan(); boolean clickedExact = false;
                                          for (ScreenNode n : tempNodes3) { String txt = n.text.toLowerCase().trim(); String desc = n.desc.toLowerCase().trim(); if ((txt.equals("supprimer") || desc.equals("supprimer") || txt.equals("oui") || desc.equals("oui")) && n.clickable) { LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()); clickedExact = true; break; } }
                                          if (!clickedExact) { for (ScreenNode n : tempNodes3) { String txt = n.text.toLowerCase().trim(); if ((txt.contains("supprimer") || txt.contains("retirer")) && txt.length() < 12) { LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()); clickedExact = true; break; } } }
                                          if (!clickedExact) { int sw = getResources().getDisplayMetrics().widthPixels; int sh = getResources().getDisplayMetrics().heightPixels; int targetX = sw / 2; int y1 = (int)(sh * 0.54); int y2 = (int)(sh * 0.58); int y3 = (int)(sh * 0.62); LmlAccessibilityService.INSTANCE.tap(targetX, y1); mainHandler.postDelayed(() -> LmlAccessibilityService.INSTANCE.tap(targetX, y2), 150); mainHandler.postDelayed(() -> LmlAccessibilityService.INSTANCE.tap(targetX, y3), 300); }
                                          mainHandler.postDelayed(() -> executeSnapCleanSequence(index + 1), 3000);
                                      }, 800); 
                                  }, 1500); 
                              } else { LmlAccessibilityService.INSTANCE.tap(10, 10); mainHandler.postDelayed(() -> executeSnapCleanSequence(index + 1), 2000); }
                          }, 2500); 
                      } else { LmlAccessibilityService.INSTANCE.tap(10, 10); mainHandler.postDelayed(() -> executeSnapCleanSequence(index + 1), 2000); }
                  }, 3000); 
              }

              private void executeStepsSequentially(List<String> steps, int index) {
                  if (isEmergencyStop) return;
                  if (index >= steps.size()) { 
                      if (agentGoal != null) { mainHandler.postDelayed(this::runAgentLoop, 5000); } 
                      else { robot.setVisibility(android.view.View.GONE); map.setVisibility(android.view.View.GONE); } return; 
                  }
                  String q = steps.get(index); int w = getResources().getDisplayMetrics().widthPixels; int h = getResources().getDisplayMetrics().heightPixels; int delay = 2000; 
                  
                  if (q.startsWith("parle ")) { String msg = q.replace("parle ", "").replace("\"", "").replace("'", "").trim(); chatLog("<font color='#00FF00'><b>TITAN:</b> " + msg + "</font>"); robot.setVisibility(android.view.View.GONE); return; }
                  else if (q.startsWith("recherche web ")) { String query = AgiIntentParser.extractQuoteArgument(q); if (query == null) query = q.replace("recherche web ", "").trim(); Intent intent = new Intent(Intent.ACTION_WEB_SEARCH); intent.putExtra(android.app.SearchManager.QUERY, query); intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); startActivity(intent); delay = 4000; }
                  else if (q.startsWith("github ")) { String feature = q.replace("github ", "").replace("\"", "").replace("'", "").trim(); GithubUplink.triggerBuild(feature); delay = 4000;}
                  else if (q.startsWith("attends ") || q.startsWith("pause ")) { int seconds = 2; try { seconds = Integer.parseInt(q.replaceAll("[^0-9]", "")); } catch(Exception e){} delay = seconds * 1000; chatLog("Pause de " + seconds + "s..."); }
                  else if (q.startsWith("clique id ")) { int id = -1; try { id = Integer.parseInt(q.replace("clique id ", "").trim()); } catch(Exception e){} doScan(); ScreenNode n = neuralSwarm.findById(lastNodes, id); if (n != null) { LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()); robot.point(n.cx(), n.cy(), "Clic ID"); } }
                  else if (q.startsWith("appui long sur ")) { doScan(); String target = q.replace("appui long sur ", "").trim(); ScreenNode n = neuralSwarm.findByText(lastNodes, target); if (n != null) { LmlAccessibilityService.INSTANCE.longPress(n.cx(), n.cy()); } }
                  else if (q.startsWith("double clic sur ") || q.startsWith("double clique sur ")) { doScan(); String target = q.replace("double clic sur ", "").replace("double clique sur ", "").trim(); ScreenNode n = neuralSwarm.findByText(lastNodes, target); if (n != null) { LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()); mainHandler.postDelayed(()->LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()), 150); } }
                  else if (q.contains("glisse") || q.contains("drag")) { LmlAccessibilityService.INSTANCE.dragAndDrop((int)(w*0.8), (int)(h*0.8), (int)(w*0.2), (int)(h*0.2)); }
                  else if (q.contains("zoom in")) { LmlAccessibilityService.INSTANCE.pinchZoom(w/2, h/2, true); }
                  else if (q.contains("zoom out")) { LmlAccessibilityService.INSTANCE.pinchZoom(w/2, h/2, false); }
                  else if (q.contains("tiktok")) { actionManager.launchApp("tiktok"); delay = 4000;}
                  else if (q.contains("whatsapp")) { actionManager.launchApp("whatsapp"); delay = 4000;}
                  else if (q.contains("instagram") || q.contains("insta")) { actionManager.launchApp("instagram"); delay = 4000;}
                  else if (q.contains("youtube")) { actionManager.launchApp("youtube"); delay = 4000;}
                  else if (q.contains("ecris") || q.contains("ecris")) {
                      doScan(); String txt = AgiIntentParser.extractQuoteArgument(q); String box = q.replace("ecris", "").replace("ecris", "").replace("dans", "").replace("sur", "").replace("\""+txt+"\"", "").replace("'"+txt+"'", "").trim();
                      if (txt != null) { ScreenNode input = neuralSwarm.findInputByText(lastNodes, box); if (input == null) input = neuralSwarm.findByText(lastNodes, box); if (input != null) { LmlAccessibilityService.INSTANCE.tap(input.cx(), input.cy()); mainHandler.postDelayed(() -> { LmlAccessibilityService.INSTANCE.injectText(input, txt); }, 500); } }
                  }
                  else if (q.equals("retour") || q.contains("recul")) { LmlAccessibilityService.INSTANCE.goBack(); }
                  else if (q.equals("accueil") || q.contains("home")) { LmlAccessibilityService.INSTANCE.goHome(); }
                  else if (q.contains("scroll bas")) { LmlAccessibilityService.INSTANCE.swipe(w/2, (int)(h*0.8), w/2, (int)(h*0.2)); } 
                  else if (q.contains("scroll haut")) { LmlAccessibilityService.INSTANCE.swipe(w/2, (int)(h*0.2), w/2, (int)(h*0.8)); }
                  else if (q.startsWith("clique ") || q.startsWith("clic ") || q.startsWith("lance ")) {
                      doScan(); String target = q.replace("clique ", "").replace("clic ", "").replace("sur ", "").replace("lance ", "").trim();
                      ScreenNode n = neuralSwarm.findByText(lastNodes, target);
                      if (n != null && (!n.danger || SafetyGuard.bypassForSafeMode)) { LmlAccessibilityService.INSTANCE.tap(n.cx(), n.cy()); } 
                  } 
                  mainHandler.postDelayed(() -> executeStepsSequentially(steps, index + 1), delay); 
              }

              @SuppressWarnings("deprecation")
              private void chatLog(String msg) { report.append(Html.fromHtml(msg + "<br><br>")); logScroll.post(() -> logScroll.fullScroll(android.view.View.FOCUS_DOWN)); }
              private void startLoops() { mainHandler.postDelayed(new Runnable() { @Override public void run() { monitor.getTelemetry(); mainHandler.postDelayed(this, 5000); } }, 1000); }
              private Button btn(String s, int c, android.view.View.OnClickListener l) { Button b = new Button(this); b.setText(s); b.setTextColor(Color.WHITE); b.setTextSize(10); b.setBackground(bg(Color.parseColor("#151515"), c, 10)); b.setOnClickListener(l); LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2); lp.setMargins(4,4,4,4); b.setLayoutParams(lp); return b; }
              private GradientDrawable bg(int f, int s, int r) { GradientDrawable g = new GradientDrawable(); g.setColor(f); g.setCornerRadius(r); g.setStroke(2, s); return g; }
              @Override public void onDestroy() { try { wm.removeView(panel); wm.removeView(robot); wm.removeView(map); mainHandler.removeCallbacksAndMessages(null); } catch(Exception e){} }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/MainActivity.java <<'EOF'
          package com.lml.robotai;
          import android.app.Activity; import android.content.Intent; import android.graphics.Color; import android.graphics.drawable.GradientDrawable; import android.net.Uri; import android.os.Bundle; import android.provider.Settings; import android.view.Gravity; import android.widget.Button; import android.widget.EditText; import android.widget.LinearLayout; import android.widget.ScrollView; import android.widget.TextView;
          public class MainActivity extends Activity {
              private RobotThemeManager theme; private SkillManager skillManager;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b); theme = new RobotThemeManager(this); skillManager = new SkillManager(this);
                  ScrollView scroll = new ScrollView(this); scroll.setBackgroundColor(Color.BLACK);
                  LinearLayout root = new LinearLayout(this); root.setOrientation(LinearLayout.VERTICAL); root.setPadding(40, 50, 40, 50); scroll.addView(root);

                  TextView title = new TextView(this); title.setText("LML V42 PHOENIX"); title.setTextColor(theme.getMainColor()); title.setTextSize(28); title.setTypeface(null, android.graphics.Typeface.BOLD); title.setGravity(Gravity.CENTER); root.addView(title);
                  
                  LinearLayout start = card("SYSTEM CORE");
                  start.addView(btn("1. OVERLAY PERMISSION", Color.parseColor("#00FFFF"), v -> startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())))));
                  start.addView(btn("2. ACCESSIBILITY", Color.parseColor("#9D00FF"), v -> startActivity(new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS))));
                  start.addView(btn("3. BOOT TITAN AGENT", Color.parseColor("#FFD700"), v -> startService(new Intent(this, FloatingRobotService.class))));
                  root.addView(start);

                  LinearLayout skillCard = card("SKILL BUILDER (V42)");
                  EditText skillName = new EditText(this); skillName.setHint("Nom (ex: msg auto)"); skillName.setTextColor(Color.WHITE); skillName.setHintTextColor(Color.parseColor("#666666"));
                  EditText skillSeq = new EditText(this); skillSeq.setHint("Ex: lance snap puis ecris \"salut\" dans recherche"); skillSeq.setTextColor(Color.WHITE); skillSeq.setHintTextColor(Color.parseColor("#666666"));
                  TextView skillList = new TextView(this); skillList.setTextColor(Color.parseColor("#CCCCCC")); skillList.setTextSize(12); skillList.setPadding(0, 20, 0, 0);
                  
                  Runnable updateList = () -> { 
                      StringBuilder sb = new StringBuilder("SKILLS ACTIVES:\n"); 
                      for(String k : skillManager.getAll().keySet()) sb.append("> ").append(k).append(" -> ").append(skillManager.getSkill(k)).append("\n"); 
                      skillList.setText(sb.toString()); 
                  }; updateList.run();
                  
                  skillCard.addView(skillName); skillCard.addView(skillSeq);
                  LinearLayout skillBtns = new LinearLayout(this); skillBtns.setOrientation(LinearLayout.HORIZONTAL);
                  skillBtns.addView(btn("SAVE", Color.parseColor("#9D00FF"), v -> { skillManager.saveSkill(skillName.getText().toString(), skillSeq.getText().toString()); skillName.setText(""); skillSeq.setText(""); updateList.run(); }), new LinearLayout.LayoutParams(0,-2,1));
                  skillBtns.addView(btn("PURGER", Color.parseColor("#FF3333"), v -> { skillManager.clearSkills(); updateList.run(); }), new LinearLayout.LayoutParams(0,-2,1));
                  skillCard.addView(skillBtns); skillCard.addView(skillList);
                  root.addView(skillCard);

                  LinearLayout themes = card("LML AESTHETICS");
                  themes.addView(btn("EDITION OR & NOIR", Color.parseColor("#FFD700"), v -> updateTheme(RobotThemeManager.THEME_NOIR_OR)));
                  themes.addView(btn("NEON CYAN", Color.parseColor("#00FFFF"), v -> updateTheme(RobotThemeManager.THEME_NEON_CYAN)));
                  themes.addView(btn("CYBER VIOLET", Color.parseColor("#9D00FF"), v -> updateTheme(RobotThemeManager.THEME_CYBER_VIOLET)));
                  root.addView(themes);

                  setContentView(scroll);
              }
              private void updateTheme(int t) { theme.setTheme(t); recreate(); }
              private LinearLayout card(String t) {
                  LinearLayout c = new LinearLayout(this); c.setOrientation(LinearLayout.VERTICAL); c.setPadding(25, 25, 25, 25); c.setBackground(bg(Color.parseColor("#0A0A0A"), Color.parseColor("#333333"), 20));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2); lp.setMargins(0, 20, 0, 20); c.setLayoutParams(lp);
                  TextView txt = new TextView(this); txt.setText(t); txt.setTextColor(Color.parseColor("#888888")); txt.setPadding(0, 0, 0, 15); c.addView(txt); return c;
              }
              private Button btn(String s, int c, android.view.View.OnClickListener l) {
                  Button b = new Button(this); b.setText(s); b.setTextColor(Color.WHITE); b.setTextSize(12); b.setBackground(bg(Color.parseColor("#151515"), c, 12)); b.setOnClickListener(l);
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2); lp.setMargins(4, 10, 4, 10); b.setLayoutParams(lp); return b;
              }
              private GradientDrawable bg(int f, int s, int r) { GradientDrawable g = new GradientDrawable(); g.setColor(f); g.setCornerRadius(r); g.setStroke(3, s); return g; }
          }
