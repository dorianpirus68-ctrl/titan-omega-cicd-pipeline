name: TITAN OMEGA CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Create complete Android project (TITAN OMEGA)
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/lml/robotai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "LMLTitanOmega"
          include ":app"
          EOF

          cat > build.gradle << 'EOF'
          plugins { id "com.android.application" version "8.5.2" apply false }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.lml.robotai">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="TITAN OMEGA" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/lml/robotai/MainActivity.java << 'EOF'
          package com.lml.robotai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("🚀 TITAN OMEGA AGI - APK prêt !");
                  tv.setTextSize(22);
                  setContentView(tv);
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id "com.android.application" }
          android {
              namespace "com.lml.robotai"
              compileSdk 34
              defaultConfig { applicationId "com.lml.robotai" minSdk 24 targetSdk 34 versionCode 1 versionName "40.1" }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies { implementation "androidx.appcompat:appcompat:1.6.1" }
          EOF

          cat > gradlew << 'EOF'
          #!/usr/bin/env sh
          exec gradle "$@"
          EOF
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/app-debug.apk release-apk/TITAN-OMEGA-v40.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TITAN-OMEGA-APK
          path: release-apk/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v40
          name: TITAN OMEGA v40 (Debug)
          body: "✅ TITAN OMEGA AGI - APK prêt à télécharger"
          files: release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}