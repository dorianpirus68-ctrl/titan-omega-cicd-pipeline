name: LML ROBOT V42 TITAN PHOENIX (LEARNING EDITION)

on:
  push:
  workflow_dispatch:
  repository_dispatch:
    types: [ai_self_update]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Create complete LML Robot AI V42 project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'lmlrobot' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'lml' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'lmlrobot' }}
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/lml/robotai
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values

          # Generation securisee de la cle keystore
          keytool -genkeypair -v -keystore app/lml-stable.keystore -alias lml -keyalg RSA -keysize 2048 -validity 10000 -storepass lmlrobot -keypass lmlrobot -dname "CN=LML, OU=App, O=Brand, L=Paris, ST=IDF, C=FR"

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "LMLRobotAIV42"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins { id "com.android.application" version "8.5.2" apply false }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id "com.android.application" }
          def runNumber = System.getenv("GITHUB_RUN_NUMBER")
          def autoVersionCode = runNumber != null ? runNumber.toInteger() : 1
          def autoVersionName = "1.0." + autoVersionCode
          android {
              namespace "com.lml.robotai"
              compileSdk 34
              defaultConfig {
                  applicationId "com.lml.robotai.v42"
                  minSdk 26
                  targetSdk 34
                  versionCode autoVersionCode
                  versionName autoVersionName
              }
              buildFeatures { buildConfig true }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              
              lint {
                  abortOnError false
                  checkReleaseBuilds false
              }
              
              signingConfigs { 
                  lmlStable { 
                      storeFile file("lml-stable.keystore")
                      storePassword "lmlrobot"
                      keyAlias "lml"
                      keyPassword "lmlrobot"
                  } 
              }
              buildTypes { 
                  debug { signingConfig signingConfigs.lmlStable }
                  release { signingConfig signingConfigs.lmlStable; minifyEnabled false } 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LML V42 PHOENIX</string>
              <string name="accessibility_desc">LML AGI V42 : Auto Correction, Apprentissage Humain, Nettoyage TikTok et Snap.</string>
          </resources>
          EOF

          cat > app/src/main/res/xml/accessibility_service_config.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:description="@string/accessibility_desc"
              android:accessibilityEventTypes="typeViewClicked|typeViewFocused|typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackGeneric"
              android:accessibilityFlags="flagReportViewIds|flagRetrieveInteractiveWindows|flagIncludeNotImportantViews"
              android:canRetrieveWindowContent="true"
              android:canPerformGestures="true"
              android:notificationTimeout="80" />
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.lml.robotai">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <application android:theme="@android:style/Theme.Material.NoActionBar" android:label="LML V42 PHOENIX" android:allowBackup="false" android:supportsRtl="true" android:resizeableActivity="true">
                  <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter> <action android:name="android.intent.action.MAIN" /> <category android:name="android.intent.category.LAUNCHER" /> </intent-filter>
                  </activity>
                  <service android:name=".FloatingRobotService" android:exported="false" />
                  <service android:name=".LmlAccessibilityService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                      <intent-filter> <action android:name="android.accessibilityservice.AccessibilityService" /> </intent-filter>
