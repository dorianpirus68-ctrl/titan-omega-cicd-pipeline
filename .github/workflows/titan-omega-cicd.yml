          cat > app/src/main/java/com/lml/robotai/ScreenNode.java <<'EOF'
          package com.lml.robotai;
          import android.graphics.Rect; import android.view.accessibility.AccessibilityNodeInfo;
          public class ScreenNode {
              public int id;
              public String text, desc, cls, pkg; public Rect bounds; public boolean clickable, danger, editable, scrollable, checked; public int confidence; public AccessibilityNodeInfo rawNode;
              public ScreenNode(AccessibilityNodeInfo n, Rect b) {
                  text = n.getText()==null?"":n.getText().toString().replace("\n"," "); desc = n.getContentDescription()==null?"":n.getContentDescription().toString().replace("\n"," "); 
                  cls = n.getClassName()==null?"":n.getClassName().toString(); pkg = n.getPackageName()==null?"":n.getPackageName().toString();
                  bounds = b == null ? new Rect() : b; clickable = n.isClickable(); editable = n.isEditable(); scrollable = n.isScrollable(); checked = n.isChecked();
                  danger = SafetyGuard.isDanger(label()); confidence = 40; rawNode = n; 
                  if (clickable) confidence += 25; if (editable) confidence += 40; if (label().length() > 0) confidence += 20; 
                  if (bounds.width() > 20 && bounds.height() > 20) confidence += 5; if (danger) confidence = 0; if (confidence > 99) confidence = 99;
              }
              public String label() { return (text + " " + desc).trim(); }
              public int cx() { return bounds.centerX(); } public int cy() { return bounds.centerY(); }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/ScreenAnalyzer.java <<'EOF'
          package com.lml.robotai;
          import android.graphics.Rect; import android.view.accessibility.AccessibilityNodeInfo; import java.util.ArrayList; import java.util.List;
          public class ScreenAnalyzer {
              public static List<ScreenNode> scan(AccessibilityNodeInfo root) { 
                  List<ScreenNode> out = new ArrayList<>(); walk(root, out); 
                  for(int i=0; i<out.size(); i++) out.get(i).id = i; 
                  return out; 
              }
              private static void walk(AccessibilityNodeInfo n, List<ScreenNode> out) {
                  if (n == null) return; Rect r = new Rect(); n.getBoundsInScreen(r);
                  if (r.width() > 10 && r.height() > 10) {
                      boolean hasText = (n.getText() != null && n.getText().length() > 0) || (n.getContentDescription() != null && n.getContentDescription().length() > 0);
                      if (n.isClickable() || n.isEditable() || n.isScrollable() || hasText) { out.add(new ScreenNode(n, r)); }
                  }
                  for (int i = 0; i < n.getChildCount(); i++) { AccessibilityNodeInfo c = n.getChild(i); walk(c, out); }
              }
              public static String exportCognitiveMap(List<ScreenNode> nodes) {
                  StringBuilder sb = new StringBuilder("ECRAN ACTUEL:\n");
                  for (ScreenNode n : nodes) {
                      String lbl = n.label();
                      if(lbl.isEmpty() && !n.clickable && !n.editable) continue;
                      sb.append("[ID:").append(n.id).append("] ");
                      if(n.editable) sb.append("CHAMP_TEXTE ");
                      else if(n.clickable) sb.append("BOUTON ");
                      else sb.append("INFO ");
                      sb.append("'").append(lbl).append("' ");
                      if(n.scrollable) sb.append("(Scrolable) ");
                      sb.append("\n");
                  }
                  return sb.toString();
              }
          }
          EOF

