          cat > app/src/main/java/com/lml/robotai/SystemMonitor.java <<'EOF'
          package com.lml.robotai;
          import android.content.Context; import android.app.ActivityManager; import android.content.Intent; import android.content.IntentFilter; import android.os.BatteryManager;
          public class SystemMonitor {
              private final Context ctx; public static boolean isBatteryLow = false; public static boolean isRamCritical = false;
              public SystemMonitor(Context c) { ctx = c; }
              public String getTelemetry() {
                  try {
                      ActivityManager am = (ActivityManager) ctx.getSystemService(Context.ACTIVITY_SERVICE); ActivityManager.MemoryInfo mi = new ActivityManager.MemoryInfo();
                      if (am != null) am.getMemoryInfo(mi); long ramFree = mi.availMem / 1048576L; long ramTotal = mi.totalMem / 1048576L;
                      isRamCritical = ramFree < (ramTotal * 0.15);
                      IntentFilter ifilter = new IntentFilter(Intent.ACTION_BATTERY_CHANGED); Intent batteryStatus = ctx.registerReceiver(null, ifilter);
                      int level = batteryStatus != null ? batteryStatus.getIntExtra(BatteryManager.EXTRA_LEVEL, -1) : -1; isBatteryLow = level > 0 && level <= 20;
                      return "SYS: " + level + "% BAT | " + ramFree + "MB RAM";
                  } catch (Exception e) { return "SYS: ERR"; }
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/NeuralSwarm.java <<'EOF'
          package com.lml.robotai;
          import java.util.List;
          public class NeuralSwarm {
              public ScreenNode findById(List<ScreenNode> nodes, int id) {
                  if (nodes == null) return null;
                  for (ScreenNode n : nodes) { if (n.id == id) return n; } return null;
              }
              public ScreenNode findByText(List<ScreenNode> nodes, String query) {
                  if (nodes == null || query == null || query.isEmpty()) return null;
                  String q = query.toLowerCase().trim(); ScreenNode best = null; int bestScore = -1;
                  for (ScreenNode n : nodes) { 
                      if (n.label().toLowerCase().contains(q)) {
                          if (!n.danger || SafetyGuard.bypassForSafeMode) { int s = 60 + n.confidence; if (s > bestScore) { best = n; bestScore = s; } }
                      } 
                  } return best;
              }
              public ScreenNode findInputByText(List<ScreenNode> nodes, String query) {
                  if (nodes == null || query == null || query.isEmpty()) return null;
                  String q = query.toLowerCase().trim(); ScreenNode best = null; int bestScore = -1;
                  for (ScreenNode n : nodes) { 
                      if (n.editable && n.label().toLowerCase().contains(q)) {
                          if (!n.danger || SafetyGuard.bypassForSafeMode) { int s = 80; if (s > bestScore) { best = n; bestScore = s; } }
                      } 
                  } return best; 
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/AgiActionManager.java <<'EOF'
          package com.lml.robotai;
          import android.content.Context; import android.content.Intent; import android.content.pm.ApplicationInfo; import android.content.pm.PackageManager;
          public class AgiActionManager {
              private final Context ctx; public AgiActionManager(Context c) { ctx = c; }
              public String launchApp(String appName) {
                  if (appName == null || appName.trim().isEmpty()) return "Nom app vide."; String target = appName.toLowerCase().trim(); PackageManager pm = ctx.getPackageManager();
                  for (ApplicationInfo app : pm.getInstalledApplications(PackageManager.GET_META_DATA)) {
                      if (pm.getApplicationLabel(app).toString().toLowerCase().contains(target)) { Intent i = pm.getLaunchIntentForPackage(app.packageName); if (i != null) { i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); ctx.startActivity(i); return "Lancement natif: " + pm.getApplicationLabel(app); } }
                  } return "App introuvable: " + appName;
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/MapOverlayView.java <<'EOF'
          package com.lml.robotai;
          import android.content.Context; import android.graphics.Canvas; import android.graphics.Paint; import android.graphics.Color; import android.view.View; import java.util.ArrayList; import java.util.List;
          public class MapOverlayView extends View {
              private List<ScreenNode> nodes = new ArrayList<>(); private final Paint p = new Paint(Paint.ANTI_ALIAS_FLAG); private final Paint txt = new Paint(Paint.ANTI_ALIAS_FLAG); private boolean visibleBoxes = true;
              public MapOverlayView(Context c) { super(c); p.setStyle(Paint.Style.STROKE); p.setStrokeWidth(4); txt.setTextSize(22); txt.setColor(Color.WHITE); }
              public void setBoxes(boolean v) { visibleBoxes = v; invalidate(); }
              public void setNodes(List<ScreenNode> n) { nodes = n == null ? new ArrayList<>() : n; invalidate(); }
              @Override protected void onDraw(Canvas c) {
                  if (!visibleBoxes) return; 
                  for (ScreenNode n : nodes) { 
                      if (n.danger) p.setColor(Color.parseColor("#FF4040")); else if (n.editable) p.setColor(Color.parseColor("#4080FF")); else if (n.scrollable) p.setColor(Color.parseColor("#B57CFF")); else if (n.clickable) p.setColor(Color.parseColor("#00E5FF")); else p.setColor(Color.parseColor("#66FFFFFF")); 
                      c.drawRect(n.bounds, p); if (n.clickable || n.editable) c.drawText("" + n.id, n.bounds.left + 6, n.bounds.top + 24, txt); 
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/lml/robotai/LmlAccessibilityService.java <<'EOF'
          package com.lml.robotai;
          import android.accessibilityservice.AccessibilityService; import android.accessibilityservice.GestureDescription; import android.graphics.Path; import android.os.Bundle; import android.view.accessibility.AccessibilityEvent; import android.view.accessibility.AccessibilityWindowInfo; import android.view.accessibility.AccessibilityNodeInfo; import java.util.ArrayList; import java.util.List;
          public class LmlAccessibilityService extends AccessibilityService {
              public static LmlAccessibilityService INSTANCE; private List<ScreenNode> nodes = new ArrayList<>();
              @Override protected void onServiceConnected() { INSTANCE = this; }
              @Override public void onAccessibilityEvent(AccessibilityEvent e) { 
                  if (e.getEventType() == AccessibilityEvent.TYPE_VIEW_CLICKED) {
                      if (LearningEngine.isRecording && e.getSource() != null) {
                          CharSequence txt = e.getSource().getText(); CharSequence desc = e.getSource().getContentDescription();
                          String label = "";
                          if (txt != null && txt.length() > 0) label = txt.toString();
                          else if (desc != null && desc.length() > 0) label = desc.toString();
                          if (!label.isEmpty()) { LearningEngine.recordClick(label); }
                      }
                  }
              }
              @Override public void onInterrupt() {}
              
              public List<ScreenNode> scan() { 
                  nodes.clear(); 
                  List<AccessibilityWindowInfo> windows = getWindows();
                  boolean targetAppFound = false;
                  for (AccessibilityWindowInfo window : windows) {
                      if (window != null && window.getRoot() != null) {
                          AccessibilityNodeInfo root = window.getRoot(); CharSequence pkg = root.getPackageName();
                          if (pkg != null && (pkg.toString().contains("snapchat") || pkg.toString().contains("tiktok") || pkg.toString().contains("musically"))) { 
                              if (!targetAppFound) { nodes.clear(); targetAppFound = true; } 
                              nodes.addAll(ScreenAnalyzer.scan(root)); 
                          } 
